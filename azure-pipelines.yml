trigger:
- '*'

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  dotnetSdkVersion: '8.0.x'
  wwwrootDir: 'Tailspin.SpaceGame.Web/wwwroot'
  artifactOutput: '$(Build.ArtifactStagingDirectory)/$(buildConfiguration)'

steps:
- task: UseDotNet@2
  displayName: 'Install .NET SDK $(dotnetSdkVersion)'
  inputs:
    packageType: 'sdk'
    version: '$(dotnetSdkVersion)'

# ✅ Install native build dependencies in case other packages need them
- script: |
    sudo apt-get update
    sudo apt-get install -y build-essential python3 g++
  displayName: 'Install native build tools (for any native npm modules)'

- task: Npm@1
  displayName: 'Run npm install'
  inputs:
    verbose: false

# ✅ Compile Sass using variable for path
- script: 'npx sass $(wwwrootDir):$(wwwrootDir)'
  displayName: 'Compile Sass assets with dart-sass'

- task: gulp@1
  displayName: 'Run gulp tasks'

- script: 'echo "$(Build.DefinitionName), $(Build.BuildId), $(Build.BuildNumber)" > buildinfo.txt'
  displayName: 'Write build info'
  workingDirectory: $(wwwrootDir)

- task: DotNetCoreCLI@2
  displayName: 'Restore project dependencies'
  inputs:
    command: 'restore'
    projects: '**/*.csproj'

- task: DotNetCoreCLI@2
  displayName: 'Build the project - $(buildConfiguration)'
  inputs:
    command: 'build'
    arguments: '--no-restore --configuration $(buildConfiguration)'
    projects: '**/*.csproj'

- task: DotNetCoreCLI@2
  displayName: 'Publish the project - $(buildConfiguration)'
  inputs:
    command: 'publish'
    projects: '**/*.csproj'
    publishWebProjects: false
    arguments: '--no-build --configuration $(buildConfiguration) --output $(artifactOutput)'
    zipAfterPublish: true

- template: templates/build.yml
  parameters:
    buildConfiguration: 'Debug'

- template: templates/build.yml
  parameters:
    buildConfiguration: 'Release'
    
- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  condition: succeeded()
